name: Daily ETF Analysis

on:
  schedule:
    # 這裡設定 UTC 時間。台灣時間 07:00 等於 UTC 23:00 (前一天)
    - cron: '0 23 * * *'
  workflow_dispatch: # 允許手動點擊按鈕執行

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 檢出程式碼
      uses: actions/checkout@v3

    - name: 設定 Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安裝必要套件
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 執行分析程式
      run: python main.py

    - name: 自動提交並推送結果
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add index.html
        git commit -m "自動更新數據: $(date)" || echo "無資料更新"
        git push
